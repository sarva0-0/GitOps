apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 740186512853.dkr.ecr.us-east-1.amazonaws.com/gitops-frontend:8c6b50ef7472e38d4bc9844e7f8a56b3d68a869d
          ports:
            - containerPort: 80
          env:
            - name: REACT_APP_API_URL
              value: http://54.84.239.147:30001
