apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: 740186512853.dkr.ecr.us-east-1.amazonaws.com/gitops-backend:8c6b50ef7472e38d4bc9844e7f8a56b3d68a869d
          ports:
            - containerPort: 5000
          env:
            - name: MONGO_URI
              value: mongodb://mongo:27017/notes
