apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: 740186512853.dkr.ecr.us-east-1.amazonaws.com/gitops-backend:29d9f0bf5fd1af74db369ca0aaa6b8d8fd3ebbe5
          ports:
            - containerPort: 5000
          env:
            - name: MONGO_URI
              value: mongodb://mongo:27017/notes
