name: CI Pipeline

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_BACKEND: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/gitops-backend
  ECR_FRONTEND: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/gitops-frontend

jobs:
  terraform:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for infra changes
        id: infra_check
        run: |
          git diff --name-only HEAD~1 HEAD | grep '^infra/' && \
          echo "changed=true" >> $GITHUB_OUTPUT || \
          echo "changed=false" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        if: steps.infra_check.outputs.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        if: steps.infra_check.outputs.changed == 'true'
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        if: steps.infra_check.outputs.changed == 'true'
        run: terraform init

      - name: Terraform Apply
        if: steps.infra_check.outputs.changed == 'true'
        run: terraform apply -auto-approve -var="key_name=${{ secrets.TF_VAR_KEY_NAME }}"

  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: terraform
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
          docker login --username AWS --password-stdin \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com

      - name: Build and push backend
        run: |
          docker build -t ${{ env.ECR_BACKEND }}:${{ github.sha }} ./backend
          docker push ${{ env.ECR_BACKEND }}:${{ github.sha }}

      - name: Build and push frontend
        run: |
          docker build \
            --build-arg REACT_APP_API_URL=http://54.84.239.147:30001 \
            -t ${{ env.ECR_FRONTEND }}:${{ github.sha }} ./frontend
          docker push ${{ env.ECR_FRONTEND }}:${{ github.sha }}

      - name: Update image tags in K8s manifests
        run: |
          sed -i "s|image: 740186512853.dkr.ecr.us-east-1.amazonaws.com/gitops-backend:.*|image: ${{ env.ECR_BACKEND }}:${{ github.sha }}|g" k8s/backend/deployment.yaml
          sed -i "s|image: 740186512853.dkr.ecr.us-east-1.amazonaws.com/gitops-frontend:.*|image: ${{ env.ECR_FRONTEND }}:${{ github.sha }}|g" k8s/frontend/deployment.yaml

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ github.sha }}"
          git push

      - name: Log deployment to DeployBoard
        if: always()   # runs even if prior steps failed — so failures are recorded too
        run: |
          STATUS="success"
          if [ "${{ job.status }}" != "success" ]; then
            STATUS="failed"
          fi

          # Calculate duration from job start (GitHub provides this via context)
          curl -s -X POST http://54.84.239.147:30001/deployments \
            -H "Content-Type: application/json" \
            -d '{
              "service":     "${{ github.event.repository.name }}",
              "environment": "production",
              "sha":         "${{ github.sha }}",
              "deployer":    "${{ github.actor }}",
              "status":      "'"$STATUS"'",
              "branch":      "${{ github.ref_name }}",
              "message":     "${{ github.event.head_commit.message }}",
              "duration":    ${{ env.DEPLOY_DURATION || 0 }}
            }'
          echo "✓ Deployment logged to DeployBoard"
