name: CI Pipeline

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_BACKEND: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/gitops-backend
  ECR_FRONTEND: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/gitops-frontend

jobs:
  terraform:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve -var="key_name=${{ secrets.TF_VAR_KEY_NAME }}"

  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
          docker login --username AWS --password-stdin \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com

      - name: Build and push backend
        run: |
          docker build -t ${{ env.ECR_BACKEND }}:${{ github.sha }} ./backend
          docker push ${{ env.ECR_BACKEND }}:${{ github.sha }}

      - name: Build and push frontend
        run: |
          docker build -t ${{ env.ECR_FRONTEND }}:${{ github.sha }} ./frontend
          docker push ${{ env.ECR_FRONTEND }}:${{ github.sha }}

      - name: Update image tags in K8s manifests
        run: |
          sed -i "s|IMAGE_TAG_BACKEND|${{ env.ECR_BACKEND }}:${{ github.sha }}|g" k8s/backend/deployment.yaml
          sed -i "s|IMAGE_TAG_FRONTEND|${{ env.ECR_FRONTEND }}:${{ github.sha }}|g" k8s/frontend/deployment.yaml

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/
          git commit -m "ci: update image tags to ${{ github.sha }}"
          git push
