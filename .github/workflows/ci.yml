name: CI Pipeline

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_BACKEND: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/gitops-backend
  ECR_FRONTEND: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/gitops-frontend

jobs:
  terraform:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for infra changes
        id: infra_check
        run: |
          git diff --name-only HEAD~1 HEAD | grep '^infra/' && \
          echo "changed=true" >> $GITHUB_OUTPUT || \
          echo "changed=false" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        if: steps.infra_check.outputs.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        if: steps.infra_check.outputs.changed == 'true'
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        if: steps.infra_check.outputs.chang
